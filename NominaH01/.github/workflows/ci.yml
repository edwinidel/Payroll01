name: .NET CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore NominaH01.sln

      - name: Build
        run: dotnet build NominaH01.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test 2FA.Tests/2FA.Tests.csproj --no-build --verbosity normal

      - name: Install dotnet-format
        run: |
          dotnet tool restore || true
          dotnet tool install -g dotnet-format --version 6.* || true

      - name: Run dotnet format (check)
        env:
          PATH: ${{ env.PATH }}:/home/runner/.dotnet/tools
        run: dotnet format --verify-no-changes
